server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Canonical host: redirect www -> non-www so Google indexes one origin.
    # (Depends on the upstream TLS proxy forwarding the original Host header.)
    if ($host = www.airfa.pt) {
        return 301 https://airfa.pt$request_uri;
    }

    # Serve pretty URLs: /banda -> /banda.html
    location / {
        try_files $uri $uri.html $uri/ =404;
    }

    # Cache static assets aggressively
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
    }

    location = /styles.css {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    # Real 404 for unknown URLs (e.g. the old Joomla /index.php/* pages) so
    # Google drops them cleanly instead of treating the homepage as a soft 404.
    error_page 404 /404.html;
    location = /404.html { internal; }
}
